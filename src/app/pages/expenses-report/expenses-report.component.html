<div class="row" [nbSpinner]="loadData !== true" nbSpinnerSize="giant" nbSpinnerStatus="primary">
  <div class="col">
    <div class="form-group">
      <label class="label d-block">Expense Type </label>
      <nb-select fullWidth [(ngModel)]="selectedType">
        <nb-option *ngFor="let type of expenseTypes" [value]="type">{{ type }}</nb-option>
      </nb-select>
    </div>
    <div class="form-group">
      <label class="label d-block">Category</label>
      <nb-select fullWidth [(ngModel)]="selectedCategory">
        <nb-option *ngFor="let category of categories" [value]="category">{{ category }}</nb-option>
      </nb-select>
    </div>
  </div>
  <div class="col">
    <div class="form-group">
      <label class="label d-block">Warehouse</label>
      <nb-select fullWidth [(ngModel)]="selectedWareHouse">
        <nb-option *ngFor="let warehouse of warehouses" [value]="warehouse">{{ warehouse }}</nb-option>
      </nb-select>
    </div>
  </div>
  <div class="col">
    <div class="form-group">
      <label class="label mr-2">From</label>
      <input nbInput [nbDatepicker]="fromdatepicker" [(ngModel)]="fromDate">
    </div>
    <div class="form-group">
      <label class="label mr-4">To</label>
      <input nbInput [nbDatepicker]="todatepicker" [(ngModel)]="toDate">
    </div>
    <nb-datepicker #fromdatepicker></nb-datepicker>
    <nb-datepicker #todatepicker></nb-datepicker>
  </div>
  <div class="col">
    <div class="mb-2">
      <button [disabled]="isLoading" (click)="loadExpensesReport()" nbButton status="primary" fullWidth>
        <div *ngIf="isLoading" class="spinner-border spinner-border-sm text-light" role="status">
          <span class="sr-only">Loading...</span>
        </div>
        <span *ngIf="!isLoading">Load Report</span>
      </button>
    </div>
    <div class="mb-2">
      <button [disabled]="isLoading" (click)="clearFilters()" nbButton status="primary" fullWidth>
        <span>Clear Filters</span>
      </button>
    </div>
  </div>
</div>
<div>
  <!-- table -->
  <div>
    <div style="overflow-x: auto">
      <nb-card>
        <nb-card-body class="text-center">
          <ng2-smart-table [settings]="expensesReportTableSettings" [source]="expensesReportTableSources">
          </ng2-smart-table>
        </nb-card-body>
      </nb-card>
    </div>
  </div>
</div>
<div class="row mt-5">
  <div class="col text-center">
    <span>Total: <span>{{total}}</span></span>
  </div>
</div>
