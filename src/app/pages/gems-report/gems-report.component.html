<div>
  <div class="d-flex flex-wrap  justify-content-start " [nbSpinner]="filtersLoaded !== true" nbSpinnerSize="giant"
       nbSpinnerStatus="primary">
    <div class="form-group px-2 ">
      <label class="label">Item Entry Date</label>
      <div class="d-flex align-items-center">
        <div>
          <!--          <button nbButton status="primary" class="p-1">All Dates</button>-->
          <nb-checkbox class="appearance-filled full-width size-medium shape-rectangle status-primary nb-transition"
                       [(ngModel)]="allDates" [(checked)]="allDates">
            All Dates
          </nb-checkbox>

        </div>
        <div class="ml-2">
          <div class="form-group">
            <label class="label mr-2">From</label>
            <input nbInput [nbDatepicker]="fromdatepicker" [(ngModel)]="fromDate" fieldSize="small">
          </div>
          <div class="form-group">
            <label class="label mr-4">To</label>
            <input nbInput [nbDatepicker]="todatepicker" [(ngModel)]="toDate" fieldSize="small">
          </div>
          <nb-datepicker #fromdatepicker></nb-datepicker>
          <nb-datepicker #todatepicker></nb-datepicker>
        </div>
      </div>
      <div class="form-group mb-1">
        <label class="label d-block">Stone Names</label>
        <nb-select fullWidth [(ngModel)]="selectedStoneName">
          <nb-option *ngFor="let key of stoneNames" [value]="key">{{ key }}</nb-option>
        </nb-select>
      </div>
    </div>
    <div>
      <div class="form-group mb-1">
        <label class="label d-block">Category</label>
        <nb-select fullWidth [(ngModel)]="selectedCategory">
          <nb-option *ngFor="let category of categories" [value]="category['ID']">{{ category['Category'] }}</nb-option>
        </nb-select>
      </div>
      <div class="form-group mb-1">
        <label class="label d-block">Description</label>
        <input nbInput name="description" [(ngModel)]="description">
      </div>
      <div class="form-group">
        <label class="label d-block">Clarity</label>
        <nb-select fullWidth [(ngModel)]="selectedClarity">
          <nb-option *ngFor="let key of clarity" [value]="key">{{ key }}</nb-option>
        </nb-select>
      </div>
    </div>
    <div>
      <div class="form-group mb-1">
        <label class="label d-block">Suppliers</label>
        <nb-select fullWidth [(ngModel)]="selectedSupplier">
          <nb-option *ngFor="let supplier of suppliers" [value]="supplier['ID']">{{ supplier['Name'] }}</nb-option>
        </nb-select>
      </div>
      <div class="form-group mb-1">
        <label class="label d-block">Collection</label>
        <nb-select fullWidth [(ngModel)]="selectedCollection">
          <nb-option *ngFor="let col of collections" [value]="col">{{ col }}</nb-option>
        </nb-select>
      </div>
      <div class="form-group mb-1" style="width: 214px">
        <label class="label d-block">Color</label>
        <nb-select fullWidth [(ngModel)]="selectedColor">
          <nb-option *ngFor="let key of colors" [value]="key">{{ key }}</nb-option>
        </nb-select>
      </div>

    </div>
    <div>
      <div class="form-group mb-1">
        <label class="label d-block">External Ref #</label>
        <input nbInput name="extRefNo" [(ngModel)]="extRefNo">
      </div>
      <div class="form-group mb-1">
        <label class="label d-block">Warehouse</label>
        <nb-select fullWidth [(ngModel)]="selectedWarehouse">
          <nb-option *ngFor="let key of warehouses" [value]="key">{{ key }}</nb-option>
        </nb-select>
      </div>
      <div class="form-group mb-1">
        <label class="label d-block">CUT/Shape</label>
        <nb-select fullWidth [(ngModel)]="selectedShape">
          <nb-option *ngFor="let shape of shapes" [value]="shape">{{ shape }}</nb-option>
        </nb-select>
      </div>
    </div>
  </div>
  <div class="d-flex flex-wrap">
    <div class="mb-2">
      <label class="label">Quantity</label>
      <nb-radio-group name="quantity" [(ngModel)]="quantity">
        <nb-radio value="greaterThanZero"> > 0</nb-radio>
        <nb-radio value="all">All</nb-radio>
        <nb-radio value="lessThanNumber">
          <= <input [disabled]="quantity !== 'lessThanNumber'" nbInput class="w-25 border" fieldSize="small"
                    name="quantityLessThan" [(ngModel)]="quantityLessThan"
                    placeholder="0"
        >
        </nb-radio>
      </nb-radio-group>
    </div>
    <div class="mt-2">
      <nb-checkbox [checked]="isCaratRange" [(ngModel)]="isCaratRange">Carat Range</nb-checkbox>
      <div>
        <input [disabled]="!isCaratRange" nbInput class="border" fieldSize="small" type="number"
               placeholder="Enter Value"
               name="quantityLessThan" [(ngModel)]="caratRangeFrom">
      </div>
      <p class="text-center mb-0">to</p>
      <div>
        <input [disabled]="!isCaratRange" nbInput class="border" fieldSize="small" type="number"
               placeholder="Enter Value"
               name="quantityLessThan" [(ngModel)]="caratRangeTo">
      </div>
    </div>
    <div class="mt-2 ml-4">
      <nb-checkbox [(ngModel)]="withCerteficates" [(checked)]="withCerteficates">With Certificates</nb-checkbox>
      <div class="mb-2">
        <button type="submit" nbButton status="primary" [disabled]="loadingReports" fullWidth (click)="loadReports()">
          <div *ngIf="loadingReports" class="spinner-border spinner-border-sm text-light" role="status">
            <span class="sr-only">Loading...</span>
          </div>
          <span *ngIf="!loadingReports">Load Report</span>
        </button>
      </div>
      <div class="mb-2">
        <button [disabled]="loadingReports" nbButton status="primary" fullWidth (click)="clearFilters()">Clear Filters</button>
      </div>
    </div>
  </div>
  <div style="overflow-x: auto">
    <nb-card>
      <nb-card-body class="text-center">
        <ng2-smart-table [settings]="gemsReportTableSettings" [source]="gemsReportTableSources">
        </ng2-smart-table>
      </nb-card-body>
    </nb-card>
  </div>

  <div class="d-flex flex-wrap justify-content-between">
    <div class="d-flex flex-wrap  ">
      <div>
        <div class="form-group mr-1">
          <label class="label d-block">Total Carats</label>
          <input nbInput fieldSize="small" readonly [value]="T_Total_Carats">
        </div>
      </div>
      <div>
        <div class="form-group mr-1">
          <label class="label d-block">Total Stones Cost</label>
          <input nbInput fieldSize="small" readonly [value]="T_Total_Stones">
        </div>
      </div>
      <div>
        <div class="form-group mr-1">
          <label class="label d-block">Total Estimate Selling</label>
          <input nbInput fieldSize="small" readonly [value]="T_Total_Estimate_Selling">
        </div>
      </div>
      <div>
        <div class="form-group mr-1">
          <label class="label d-block">Total Stones</label>
          <input nbInput fieldSize="small" readonly [value]="T_Total_Stones_Cost_Price">
        </div>
      </div>
    </div>

  </div>
</div>
