<div class="row">

      </nb-card-header>
      <nb-card-body class="text-center">
        <div class="row">
          <div class="col-md-4">
            <nb-card>
              <nb-card-header class="text-center">
                <span class="title h5">{{spTotal_LBP}}</span>
              </nb-card-header>
              <div class="details text-center">
                <div class="h6" style="font-size: 14px;color:var(--text-primary-color)">TOTAL {{Secondary_Currency_Label}}</div>
              </div>
            </nb-card>
          </div>

          </div>

              <div class="details text-center">
                <div class="h6" style="font-size: 14px;color:var(--text-primary-color)">TOTAL GOLD</div>
              </div>
            </nb-card>
          </div>
        </div>

    </nb-card>
  </div>
</div>
