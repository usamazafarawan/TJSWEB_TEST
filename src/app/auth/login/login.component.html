<img src="../../../assets/images/Logo.png" class="image-logo" />
<h3 id="title" class="title">&nbsp;</h3>

<nb-alert *ngIf="showMessages.error && errors?.length && !submitted" outline="danger" role="alert">
    <p class="alert-title"><b>Oh snap!</b></p>
    <ul class="alert-message-list">
        <li *ngFor="let error of errors" class="alert-message">{{ error }}</li>
    </ul>
</nb-alert>

<nb-alert *ngIf="showMessages.success && messages?.length && !submitted" outline="success" role="alert">
    <p class="alert-title"><b>Hooray!</b></p>
    <ul class="alert-message-list">
        <li *ngFor="let message of messages" class="alert-message">{{ message }}</li>
    </ul>
</nb-alert>

<form (ngSubmit)="login()" #form="ngForm" aria-labelledby="title" autocomplete="new-password">

    <div class="form-control-group">
        <label class="label" for="input-username">Username:</label>
        <input nbInput fullWidth [(ngModel)]="user.username" #username="ngModel" name="username" id="input-username"
            placeholder="Username" autofocus
            [status]="username.dirty ? (username.invalid  ? 'danger' : 'warning') : 'basic'"
            [required]="getConfigValue('forms.validation.username.required')"
            [attr.aria-invalid]="username.invalid && username.touched ? true : null" autocomplete="off" />
        <ng-container *ngIf="username.invalid && username.touched">
            <p class="caption status-danger" *ngIf="username.errors?.required">
                Username is required!
            </p>
        </ng-container>
    </div>

    <div class="form-control-group">
        <label class="label" for="input-password">Password:</label>
        <!-- Added line to disable password autocomplete in the browser -->
        <input nbInput name="password" type="password" autocomplete="off" style="display: none;" />
        <input nbInput fullWidth [(ngModel)]="user.password" #password="ngModel" name="password" type="password"
            id="input-password" placeholder="Password"
            [status]="password.dirty ? (password.invalid  ? 'danger' : 'warning') : 'basic'"
            [required]="getConfigValue('forms.validation.password.required')"
            [minlength]="getConfigValue('forms.validation.password.minLength')"
            [maxlength]="getConfigValue('forms.validation.password.maxLength')"
            [attr.aria-invalid]="password.invalid && password.touched ? true : null" />
        <ng-container *ngIf="password.invalid && password.touched ">
            <p class="caption status-danger" *ngIf="password.errors?.required">
                Password is required!
            </p>
            <p class="caption status-danger" *ngIf="(password.errors?.minlength || password.errors?.maxlength)">
                Password should contains
                from {{ getConfigValue('forms.validation.password.minLength') }}
                to {{ getConfigValue('forms.validation.password.maxLength') }}
                characters
            </p>
        </ng-container>
    </div>

    <button nbButton fullWidth status="warning" [disabled]="submitted || !form.valid" [class.btn-pulse]="submitted">
        Sign In
    </button>
</form>
